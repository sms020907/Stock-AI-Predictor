name: Stock-AI-Daily-Predictor

on:
  workflow_dispatch:  # 사용자가 원할 때 수동으로 버튼을 눌러 실행

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 라이브러리 이름의 대소문자와 하이픈(-)을 정확하게 수정했습니다.
          pip install pandas finance-datareader beautifulsoup4 requests openpyxl lxml

      - name: Run script
        env:
          # GitHub Secrets에 저장한 토큰과 ID를 파이썬 코드로 연결합니다.
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stock_predict.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Stock-Report
          path: ./*.xlsx
