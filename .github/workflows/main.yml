name: Stock AI Predictor Test Mode

on:
  workflow_dispatch: # 버튼 수동 실행 유지

  schedule:
    # 한국 시간 오후 4:45 = UTC 오전 7:45
    # 분 시 일 월 요일
    - cron: '00 10 * * *'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install pandas finance-datareader requests beautifulsoup4 lxml openpyxl numpy

      - name: Run Analysis Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stock_predict.py # 파일 이름이 다르면 꼭 수정하세요!
