name: Stock-AI-Daily-Predictor

on:
  schedule:
    # 한국 시간 기준 매일 오전 8시 실행 (UTC 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch: # 직접 실행하고 싶을 때 누르는 버튼 생성

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 체크아웃
        uses: actions/checkout@v3

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필요한 라이브러리 설치
        run: |
          pip install -r requirements.txt

      - name: 주식 예측 코드 실행
        env:
          # 텔레그램 연동 시 필요한 비밀값 (나중에 Settings에서 설정)
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python stock_predict.py

      - name: 결과물(엑셀) 저장
        uses: actions/upload-artifact@v3
        with:
          name: AI-Stock-Report
          path: ./*.xlsx
