name: Stock AI Predictor

on:
  # 1. 구글 앱스 스크립트(GAS) 신호를 받기 위한 설정
  workflow_dispatch:
  
  # 2. 텔레그램 /start 버튼 신호를 받기 위한 설정
  repository_dispatch:
    types: [telegram_start]
    
  # 3. 깃허브 자체 스케줄러 (혹시 모를 백업용 - 아침 8시 30분)
  schedule:
    - cron: '30 23 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: ambassadors/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pandas_datareader yfinance scikit-learn matplotlib requests tautulli-telegram-notification python-telegram-bot

      - name: Run Stock Prediction
        env:
          # 여기에 민성님의 텔레그램 토큰과 ID가 환경변수로 등록되어 있어야 합니다.
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stock_predict.py
