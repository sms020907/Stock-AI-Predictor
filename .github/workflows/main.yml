name: Stock-AI-Daily-Predictor

on:
  schedule:
    # 한국 시간(KST) 매일 오전 08:50 실행
    # (UTC 기준 전날 23:50)
    - cron: '50 23 * * *'
  workflow_dispatch: # 수동 실행 버튼 (테스트용으로 남겨둠)

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas finance-datareader beautifulsoup4 requests openpyxl lxml numpy

      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stock_predict.py
