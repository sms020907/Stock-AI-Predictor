name: Stock AI Predictor

on:
  workflow_dispatch:
  repository_dispatch:
    types: [telegram_start]
  schedule:
    - cron: '30 23 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 필요한 모든 라이브러리를 한 번에 설치합니다.
          pip install pandas yfinance scikit-learn matplotlib requests python-telegram-bot finance-datareader openpyxl

      - name: Run Stock Prediction
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stock_predict.py
