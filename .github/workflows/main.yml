name: Stock AI Predictor Dual Mode

on:
  # 1. 텔레그램 리모컨 버튼 클릭 시 즉시 실행 (수동)
  workflow_dispatch:

  # 2. 매일 아침 08:30 자동 실행 (스케줄러)
  schedule:
    # 한국 시간(KST) 08:30은 UTC 기준으로 전날 23:30입니다.
    - cron: '30 23 * * *'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install pandas FinanceDataReader requests beautifulsoup4 lxml openpyxl numpy

      - name: Run Analysis Script
        env:
          # GitHub Secrets에 등록된 값을 환경 변수로 불러옵니다.
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # 민성님의 파이썬 파일 이름이 'analysis.py'가 아니라면 해당 이름으로 수정하세요!
        run: python analysis.py
