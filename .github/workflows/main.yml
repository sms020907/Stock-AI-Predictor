name: Stock AI Predictor

on:
  workflow_dispatch:      # 구글 앱스 스크립트(GAS)용
  repository_dispatch:    # 텔레그램 버튼용 (모든 신호 수용)
  schedule:
    - cron: '30 23 * * *' # 백업용 아침 8시 30분

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pandas_datareader yfinance scikit-learn matplotlib requests python-telegram-bot

      - name: Run Stock Prediction
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stock_predict.py
