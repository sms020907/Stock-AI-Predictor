name: Stock-AI-Daily-Predictor

on:
  schedule:
    # 한국 시간(KST) 오후 3시 10분 실행 설정
    # (UTC 기준 당일 06:10)
    - cron: '10 06 * * *'
  workflow_dispatch: # 혹시 모르니 수동 버튼도 유지

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install pandas finance-datareader beautifulsoup4 requests openpyxl lxml numpy
      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stock_predict.py
