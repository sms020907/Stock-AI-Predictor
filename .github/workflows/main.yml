name: Stock-AI-Daily-Predictor

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: 

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 체크아웃
        uses: actions/checkout@v4 # v3 -> v4로 변경

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5 # v4 -> v5로 변경 (더 최신버전)
        with:
          python-version: '3.10'

      - name: 필요한 라이브러리 설치
        run: |
          pip install -r requirements.txt

      - name: 주식 예측 코드 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python stock_predict.py

      - name: 결과물(엑셀) 저장
        uses: actions/upload-artifact@v4 # 여기가 핵심! v3 -> v4로 변경
        with:
          name: AI-Stock-Report
          path: ./*.xlsx
